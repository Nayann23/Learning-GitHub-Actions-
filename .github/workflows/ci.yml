name: JSON Artifact Demo

on:
  workflow_dispatch:

jobs:
  create-json:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python app.py

      - uses: actions/upload-artifact@v4
        with:
          name: run-info
          path: run_info.json